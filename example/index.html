<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duel Protocol — E2E Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚔️</span>
        <h1>Duel Protocol</h1>
        <span class="badge">localnet</span>
      </div>
      <div class="header-actions">
        <div id="wallet-status" class="wallet-status disconnected">
          <span class="dot"></span>
          <span id="wallet-label">Not Connected</span>
        </div>
        <button id="connect-btn" class="btn btn-primary">Connect Wallet</button>
      </div>
    </header>

    <!-- Market Creator -->
    <section class="card" id="create-section">
      <h2>🏗️ Create Market</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Market ID</label>
          <input type="number" id="market-id" value="1" min="1" />
        </div>
        <div class="form-group">
          <label>Deadline (seconds from now)</label>
          <input type="number" id="deadline-secs" value="120" min="30" />
        </div>
        <div class="form-group">
          <label>TWAP Window (s)</label>
          <input type="number" id="twap-window" value="60" min="10" />
        </div>
        <div class="form-group">
          <label>TWAP Interval (s)</label>
          <input type="number" id="twap-interval" value="10" min="10" />
        </div>
        <div class="form-group">
          <label>Battle Tax (bps)</label>
          <input type="number" id="battle-tax" value="5000" min="0" max="10000" />
        </div>
        <div class="form-group">
          <label>Protocol Fee (bps)</label>
          <input type="number" id="protocol-fee" value="100" min="0" max="500" />
        </div>
        <div class="form-group">
          <label>Sell Penalty Max (bps)</label>
          <input type="number" id="sell-penalty" value="1500" min="0" max="3000" />
        </div>
        <div class="form-group">
          <label>Protection Offset (s)</label>
          <input type="number" id="protection-offset" value="30" min="0" />
        </div>
      </div>
      <button id="create-market-btn" class="btn btn-accent" disabled>Create Market</button>
    </section>

    <!-- Market State -->
    <section class="card" id="market-section" style="display:none">
      <h2>📊 Market State</h2>
      <button id="refresh-btn" class="btn btn-small btn-ghost">↻ Refresh</button>
      <div class="market-state" id="market-state"></div>
    </section>

    <!-- Trading Panel -->
    <section class="sides-grid" id="sides-section" style="display:none">
      <!-- Side A -->
      <div class="card side-card side-a">
        <h3>🔴 Side A</h3>
        <div class="side-stats" id="side-a-stats"></div>
        <div class="trade-actions">
          <div class="form-group">
            <label>SOL to Buy</label>
            <input type="number" id="buy-a-amount" value="1" step="0.1" min="0.01" />
          </div>
          <button class="btn btn-buy" id="buy-a-btn" disabled>Buy Side A</button>
          <div class="form-group">
            <label>Tokens to Sell</label>
            <input type="number" id="sell-a-amount" value="0" />
          </div>
          <button class="btn btn-sell" id="sell-a-btn" disabled>Sell Side A</button>
        </div>
      </div>

      <!-- Side B -->
      <div class="card side-card side-b">
        <h3>🔵 Side B</h3>
        <div class="side-stats" id="side-b-stats"></div>
        <div class="trade-actions">
          <div class="form-group">
            <label>SOL to Buy</label>
            <input type="number" id="buy-b-amount" value="1" step="0.1" min="0.01" />
          </div>
          <button class="btn btn-buy" id="buy-b-btn" disabled>Buy Side B</button>
          <div class="form-group">
            <label>Tokens to Sell</label>
            <input type="number" id="sell-b-amount" value="0" />
          </div>
          <button class="btn btn-sell" id="sell-b-btn" disabled>Sell Side B</button>
        </div>
      </div>
    </section>

    <!-- Actions -->
    <section class="card actions-card" id="actions-section" style="display:none">
      <h2>⚡ Actions</h2>
      <div class="actions-grid">
        <button id="twap-btn" class="btn btn-accent" disabled>🕐 Record TWAP Sample</button>
        <button id="resolve-btn" class="btn btn-accent" disabled>🏆 Resolve Market</button>
        <button id="sell-post-a-btn" class="btn btn-accent" disabled>💰 Sell Post-Resolution (A)</button>
        <button id="sell-post-b-btn" class="btn btn-accent" disabled>💰 Sell Post-Resolution (B)</button>
      </div>
    </section>

    <!-- Event Log -->
    <section class="card" id="log-section">
      <h2>📋 Event Log</h2>
      <div id="event-log" class="event-log"></div>
    </section>
  </div>

  <!-- Load dependencies from CDN -->
  <script src="https://unpkg.com/@solana/web3.js@1.95.8/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/@coral-xyz/anchor@0.30.1/dist/browser/index.umd.js"></script>
  <script src="https://unpkg.com/bn.js@5.2.1/bn.js"></script>
  <script src="app.js"></script>
</body>
</html>
